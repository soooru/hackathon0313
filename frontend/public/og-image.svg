<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FFF8F0"/>
  <!-- 체크무늬 패턴 -->
  <defs>
    <pattern id="check" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M0 0 L40 40 M40 0 L0 40" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#check)"/>

  <!-- 카드 -->
  <rect x="200" y="115" width="800" height="400" rx="24" fill="white" stroke="#FFD5C2" stroke-width="3"/>

  <!-- 이모지 -->
  <text x="600" y="280" font-size="96" text-anchor="middle" dominant-baseline="middle">🛍️</text>

  <!-- 제목 -->
  <text x="600" y="370" font-family="sans-serif" font-size="64" font-weight="bold" fill="#FF6B35" text-anchor="middle">출근장터</text>

  <!-- 부제 -->
  <text x="600" y="440" font-family="sans-serif" font-size="26" fill="#888" text-anchor="middle">사내 직원 전용 중고거래 플랫폼</text>

  <!-- 태그들 -->
  <rect x="268" y="475" width="120" height="36" rx="18" fill="#FF6B35"/>
  <text x="328" y="499" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">팝니다</text>

  <rect x="404" y="475" width="120" height="36" rx="18" fill="#4ECDC4"/>
  <text x="464" y="499" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">삽니다</text>

  <rect x="540" y="475" width="120" height="36" rx="18" fill="#FFE66D"/>
  <text x="600" y="499" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle" dominant-baseline="middle">나눕니다</text>

  <rect x="676" y="475" width="150" height="36" rx="18" fill="#9B59B6"/>
  <text x="751" y="499" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">같이삽시다</text>
</svg>
